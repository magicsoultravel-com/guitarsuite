<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a guitar suite... chords, tabs, notes, scales</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header>
      <h1>a guitar suite...</h1>
    </header>
    <main>
      <div class="main-container">
        <div class="sections-wrapper" id="app"></div>
      </div>
    </main>
    <footer id="site-footer"></footer>
  </div>
  <script type="module" src="./src/main.js"></script>
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var app = document.getElementById('app');
        if (app && !app.children.length && !app.textContent.trim()) {
          app.innerHTML = '<div class="section"><h2>Could not load app</h2><p>JavaScript failed to load. Try a hard refresh (Ctrl+Shift+R). If the problem persists, check the browser console for errors.</p></div>';
        }
      }, 800);
    });
  </script>
</body>
</html>
