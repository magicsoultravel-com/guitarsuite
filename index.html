<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a guitar suite... chords, tabs, notes, scales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <header class="site-brand">
    <h1>A guitar suite...</h1>
  </header>
  <main class="site-layout">
    <div class="main-column">
      <div id="app" class="sections-wrapper"></div>
    </div>
  </main>
  <div class="site-footer-stack">
    <footer id="site-footer"></footer>
    <p class="site-credit" id="site-tagline"></p>
  </div>
  <script type="module" src="./src/main.js"></script>
  <script>
    document.getElementById('site-tagline').textContent =
      '\u00A9 ' + new Date().getFullYear() + ' minimal website design inc.';
    window.addEventListener('load', function () {
      setTimeout(function () {
        var app = document.getElementById('app');
        if (app && !app.children.length && !app.textContent.trim()) {
          app.innerHTML = '<div class="section"><h2>Could not load app</h2><p>JavaScript failed to load. Try a hard refresh (Ctrl+Shift+R).</p></div>';
        }
      }, 800);
    });
  </script>
</body>
</html>
