<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a guitar suite... chords, tabs, notes, scales</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header>
      <h1>a guitar suite...</h1>
    </header>
    <main class="site-layout">
      <aside id="fretboard-sidebar" class="fretboard-sidebar" aria-label="Interactive fretboard">
        <div class="sidebar-header">
          <h2>fretboard</h2>
          <button type="button" id="sidebar-hide" class="sidebar-toggle" title="Hide fretboard">◀</button>
        </div>
        <div id="sidebar-inner" class="sidebar-inner"></div>
      </aside>
      <button type="button" id="sidebar-show" class="sidebar-show-btn" title="Show fretboard" hidden>▶</button>
      <div class="main-column">
        <div id="app" class="sections-wrapper"></div>
      </div>
    </main>
    <footer id="site-footer"></footer>
  </div>
  <script type="module" src="./src/main.js"></script>
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var app = document.getElementById('app');
        if (app && !app.children.length && !app.textContent.trim()) {
          app.innerHTML = '<div class="section"><h2>Could not load app</h2><p>JavaScript failed to load. Try a hard refresh (Ctrl+Shift+R). If the problem persists, check the browser console for errors.</p></div>';
        }
      }, 800);
    });
  </script>
</body>
</html>
